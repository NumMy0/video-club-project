<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Poster no disponible</title>
  <desc id="desc">Imagen de respaldo para peliculas sin poster</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)" />
  <rect x="70" y="140" width="460" height="620" rx="24" fill="none" stroke="#94a3b8" stroke-width="8" stroke-dasharray="16 14" />
  <g fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="300" y="415" font-size="42" font-weight="700">POSTER</text>
    <text x="300" y="470" font-size="42" font-weight="700">NO DISPONIBLE</text>
  </g>
</svg>
